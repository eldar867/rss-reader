<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS Агрегатор</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container mt-4">
    <h1 class="text-center mb-4">RSS Агрегатор</h1>

    <!-- Форма добавления RSS -->
    <div class="card mb-4">
      <div class="card-body">
        <form id="rss-form" class="row g-3">
          <div class="col-md-8">
            <input type="text" class="form-control" id="rss-url" placeholder="Введите URL RSS-ленты">
          </div>
          <div class="col-md-4">
            <button type="submit" class="btn btn-primary w-100">Добавить</button>
          </div>
        </form>
        <div id="error-message" class="text-danger mt-2"></div>
      </div>
    </div>

    <!-- Список фидов -->
    <div class="row">
      <div class="col-md-4">
        <div class="card">
          <div class="card-header">Каналы</div>
          <ul id="feeds-list" class="list-group list-group-flush"></ul>
        </div>
      </div>

      <!-- Список постов -->
      <div class="col-md-8">
        <div class="card">
          <div class="card-header">Посты</div>
          <div id="posts-list" class="list-group list-group-flush"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Модальное окно -->
  <div class="modal fade" id="postModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-title"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer">
          <a id="modal-link" href="#" target="_blank" class="btn btn-primary">Открыть</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/yup@1.2.0/dist/yup.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
